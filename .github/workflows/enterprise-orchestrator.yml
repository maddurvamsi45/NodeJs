name: Enterprise Self-Healing Orchestrator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  call-deploy:
    # Points directly to our centralized reusable blueprint tracking file
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      target_env: 'production'

  on-failure:
    needs: call-deploy
    # CRITICAL FIX: Explicitly check the execution map resolution array state
    if: always() && needs.call-deploy.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Secure Microservice Repository Verification
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f

      - name: Generate Local Emergency Rollback Tools
        run: |
          mkdir -p ./scripts
          echo 'echo "ALERT: Reverting active container cluster layers to last known stable tag..."' > ./scripts/rollback.sh
          chmod +x ./scripts/rollback.sh

      - name: Execute Automated System Self-Healing Routine
        run: |
          echo "Intercepted operational breakdown inside pipeline run context ID: ${{ github.run_id }}"
          ./scripts/rollback.sh

      - name: Dispatch Secure Incidents Alert to Slack Channels
        run: echo "Sending encrypted payload metrics out to target webhook endpoints..."
